{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "open-jira.fullname" . }}
  labels:
    {{- include "open-jira.labels" . | nindent 4 }}
spec:
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ include "open-jira.fullname" . }}-api
            port:
              number: 8080
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: {{ include "open-jira.fullname" . }}-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "open-jira.fullname" . }}-frontend
            port:
              number: 80
{{- end }}
