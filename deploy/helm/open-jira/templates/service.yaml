apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-jira.fullname" . }}-api
  labels:
    {{- include "open-jira.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    {{- include "open-jira.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-jira.fullname" . }}-frontend
  labels:
    {{- include "open-jira.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    {{- include "open-jira.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
