apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "heureum.fullname" . }}-config
  labels:
    {{- include "heureum.labels" . | nindent 4 }}
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  APP_BASE_URL: {{ .Values.config.baseUrl | quote }}
  DB_DRIVER: {{ .Values.config.dbDriver | quote }}
  DB_DSN: {{ .Values.config.dbDsn | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  SMTP_HOST: {{ .Values.config.smtpHost | quote }}
  APP_UPLOADS_DIR: {{ .Values.uploads.dir | quote }}
