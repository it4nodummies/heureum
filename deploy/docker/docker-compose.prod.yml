services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openjira
      POSTGRES_PASSWORD: openjira
      POSTGRES_DB: openjira
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openjira"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/it4nodummies/heureum-api:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_SECRET: "${APP_SECRET:-changeme-please-set-a-real-secret-min-32-chars}"
      APP_ENV: production
      APP_PORT: "8080"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost}"
      DB_DRIVER: postgres
      DB_DSN: "postgres://openjira:openjira@postgres:5432/openjira?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      APP_UPLOADS_DIR: "/data/uploads"
      # SMTP_*: planned — not yet consumed by the API (dead config until email delivery lands)
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped

  worker:
    image: ghcr.io/it4nodummies/heureum-worker:latest
    depends_on:
      - api
    environment:
      APP_SECRET: "${APP_SECRET:-changeme-please-set-a-real-secret-min-32-chars}"
      APP_ENV: production
      DB_DRIVER: postgres
      DB_DSN: "postgres://openjira:openjira@postgres:5432/openjira?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
    restart: unless-stopped

  frontend:
    image: ghcr.io/it4nodummies/heureum-frontend:latest
    depends_on:
      - api
    environment:
      # Server-side: used by Next.js rewrites inside Docker network
      API_URL: "http://api:8080"
    restart: unless-stopped

  # ── Reverse proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ../../nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  uploads:
