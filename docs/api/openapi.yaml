openapi: "3.0.3"
info:
  title: Open Jira API — Jira Cloud v3 Compatible
  description: Open-source Jira clone REST API compatible with Jira Cloud REST API v3
  version: 3.0.0
servers:
  - url: /rest/api/3
    description: Base API path
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Myself
  - name: Users
  - name: Projects
  - name: Issues
  - name: Comments
  - name: Attachments
  - name: Issue Links
  - name: Watchers
  - name: Workflows
  - name: Sprints
  - name: Board
  - name: Search
  - name: Filters
  - name: Reports
  - name: Dashboards
  - name: Notifications
  - name: Git
  - name: CustomFields
  - name: Automation
  - name: Timeline
  - name: Calendar
  - name: Export

paths:
  # ── Auth ──────────────────────────────────────────────────────────
  /auth/register:
    post:
      summary: Register a new user
      operationId: register
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, username, password]
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                password:
                  type: string
                  format: password
                display_name:
                  type: string
      responses:
        "201":
          description: User created
        "409":
          description: Email or username already taken

  /auth/login:
    post:
      summary: Login and get JWT token
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /auth/oauth/{provider}/redirect:
    get:
      summary: Initiate OAuth flow
      operationId: oauthRedirect
      tags: [Auth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [github, gitlab, google]
      responses:
        "302":
          description: Redirect to OAuth provider

  /auth/oauth/{provider}/callback:
    get:
      summary: OAuth callback
      operationId: oauthCallback
      tags: [Auth]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [github, gitlab, google]
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "200":
          description: JWT token after OAuth
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  # ── Myself ───────────────────────────────────────────────────────
  /myself:
    get:
      summary: Get current user profile
      operationId: getMyself
      tags: [Myself]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Users ────────────────────────────────────────────────────────
  /users/me:
    get:
      summary: Get current user (alias for /myself)
      operationId: getCurrentUser
      tags: [Users]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/search:
    get:
      summary: Search users by query
      operationId: searchUsers
      tags: [Users]
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
          description: Search query (matches username, email, display_name)
        - name: startAt
          in: query
          schema:
            type: integer
            default: 0
        - name: maxResults
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated user results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponseUser"

  /user:
    get:
      summary: Get user by account ID
      operationId: getUser
      tags: [Users]
      parameters:
        - name: accountId
          in: query
          required: true
          schema:
            type: string
          description: User account ID
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  # ── Projects ─────────────────────────────────────────────────────
  /project:
    get:
      summary: List all projects
      operationId: listProjects
      tags: [Projects]
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      summary: Create a project
      operationId: createProject
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, key]
              properties:
                name:
                  type: string
                  description: Project name
                key:
                  type: string
                  description: Project key (e.g. "PROJ")
                description:
                  type: string
                type:
                  type: string
                  enum: [scrum, kanban, business]
                  default: scrum
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "409":
          description: Project key already exists

  /project/search:
    get:
      summary: Search projects (paginated)
      operationId: searchProjects
      tags: [Projects]
      parameters:
        - name: startAt
          in: query
          schema:
            type: integer
            default: 0
        - name: maxResults
          in: query
          schema:
            type: integer
            default: 50
        - name: query
          in: query
          schema:
            type: string
          description: Search by name or key
        - name: typeKey
          in: query
          schema:
            type: string
            enum: [scrum, kanban, business]
      responses:
        "200":
          description: Paginated project results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponseProject"

  /project/{projectIdOrKey}:
    get:
      summary: Get project by ID or key
      operationId: getProject
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found
    put:
      summary: Update project
      operationId: updateProject
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                type:
                  type: string
                  enum: [scrum, kanban, business]
                lead_user_id:
                  type: string
                default_assignee:
                  type: string
                icon_url:
                  type: string
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      summary: Delete project
      operationId: deleteProject
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Project deleted

  /project/{projectIdOrKey}/statuses:
    get:
      summary: Get project statuses
      operationId: getProjectStatuses
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Project statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowStatus"

  /project/{projectIdOrKey}/members:
    get:
      summary: List project members
      operationId: listProjectMembers
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"
    post:
      summary: Add member to project
      operationId: addProjectMember
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id:
                  type: string
      responses:
        "201":
          description: Member added
        "409":
          description: Already a member

  /project/{projectIdOrKey}/members/{userId}:
    delete:
      summary: Remove member from project
      operationId: removeProjectMember
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Member removed

  /project/{projectIdOrKey}/invites:
    post:
      summary: Invite user to project
      operationId: inviteToProject
      tags: [Projects]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "201":
          description: Invitation sent

  # ── Issues ───────────────────────────────────────────────────────
  /project/{projectIdOrKey}/issues:
    get:
      summary: List issues for a project
      operationId: listIssuesByProject
      tags: [Issues]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issue list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"

  /issue:
    post:
      summary: Create an issue
      operationId: createIssue
      tags: [Issues]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                project_key:
                  type: string
                  description: Project key (e.g. "PROJ")
                project_id:
                  type: string
                  description: Project ID
                title:
                  type: string
                  description: Issue title/summary
                description:
                  type: string
                  description: Issue description (markdown)
                priority:
                  type: string
                  enum: [highest, high, medium, low, lowest]
                  default: medium
                parent_id:
                  type: string
                  description: Parent issue ID (for subtasks)
                type_id:
                  type: string
                  description: Issue type ID
      responses:
        "201":
          description: Issue created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"

  /issue/{issueIdOrKey}:
    get:
      summary: Get issue by ID or key
      operationId: getIssue
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issue details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
        "404":
          description: Issue not found
    put:
      summary: Edit issue
      operationId: updateIssue
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description_json:
                  type: string
                priority:
                  type: string
                  enum: [highest, high, medium, low, lowest]
                assignee_id:
                  type: string
                status_id:
                  type: string
                story_points:
                  type: integer
      responses:
        "200":
          description: Issue updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue"
    delete:
      summary: Delete (archive) issue
      operationId: deleteIssue
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Issue archived

  /issue/{issueIdOrKey}/assignee:
    put:
      summary: Assign an issue to a user
      operationId: assignIssue
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  type: string
                  description: User ID to assign (empty to unassign)
      responses:
        "204":
          description: Assignment updated

  /issue/{issueIdOrKey}/labels:
    post:
      summary: Add a label to an issue
      operationId: addLabel
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                color:
                  type: string
                  default: "#6B7280"
      responses:
        "201":
          description: Label added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Label"

  /issue/{issueIdOrKey}/changelog:
    get:
      summary: Get issue change history
      operationId: getChangelog
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Change history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IssueHistory"

  /issue/{issueIdOrKey}/transitions:
    get:
      summary: Get available transitions for an issue
      operationId: getTransitions
      tags: [Workflows]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Available transitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkflowTransition"
    post:
      summary: Transition issue to a new status
      operationId: transitionIssue
      tags: [Workflows]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_status_id]
              properties:
                to_status_id:
                  type: string
      responses:
        "200":
          description: Issue transitioned

  /issue/{issueIdOrKey}/notify:
    post:
      summary: Send a notification about an issue
      operationId: notifyIssue
      tags: [Issues]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, textBody]
              properties:
                subject:
                  type: string
                textBody:
                  type: string
                htmlBody:
                  type: string
                to:
                  type: object
                  properties:
                    users:
                      type: array
                      items:
                        type: string
      responses:
        "200":
          description: Notification sent

  /issue/{issueIdOrKey}/git:
    get:
      summary: Get linked git information for an issue
      operationId: getIssueGitInfo
      tags: [Git]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Git info (commits, branches, pull requests)
          content:
            application/json:
              schema:
                type: object
                properties:
                  commits:
                    type: array
                    items:
                      $ref: "#/components/schemas/IssueCommit"
                  branches:
                    type: array
                    items:
                      $ref: "#/components/schemas/IssueBranch"
                  pull_requests:
                    type: array
                    items:
                      $ref: "#/components/schemas/IssuePullRequest"

  # ── Comments ─────────────────────────────────────────────────────
  /issue/{issueIdOrKey}/comment:
    get:
      summary: List comments on an issue (paginated)
      operationId: listComments
      tags: [Comments]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: startAt
          in: query
          schema:
            type: integer
            default: 0
        - name: maxResults
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated comment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageResponseComment"
    post:
      summary: Add a comment to an issue
      operationId: createComment
      tags: [Comments]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body_json]
              properties:
                body_json:
                  type: string
                  description: Comment body in ProseMirror JSON format
                author_id:
                  type: string
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /issue/{issueIdOrKey}/comment/{id}:
    get:
      summary: Get a comment by ID
      operationId: getComment
      tags: [Comments]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
        "404":
          description: Comment not found
    put:
      summary: Update a comment
      operationId: updateComment
      tags: [Comments]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                body_json:
                  type: string
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"
    delete:
      summary: Delete a comment
      operationId: deleteComment
      tags: [Comments]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Comment deleted

  /comment/list:
    post:
      summary: List comments by IDs
      operationId: listCommentsByIds
      tags: [Comments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

  # ── Attachments ──────────────────────────────────────────────────
  /issue/{issueIdOrKey}/attachments:
    post:
      summary: Upload attachments to an issue
      operationId: uploadAttachment
      tags: [Attachments]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Attachment uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueAttachment"

  /attachment/{id}:
    get:
      summary: Get attachment metadata
      operationId: getAttachment
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attachment metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueAttachment"
        "404":
          description: Attachment not found
    delete:
      summary: Delete an attachment
      operationId: deleteAttachment
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Attachment deleted

  /attachment/content/{id}:
    get:
      summary: Download attachment content
      operationId: downloadAttachment
      tags: [Attachments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /attachment/meta:
    get:
      summary: Get attachment upload configuration
      operationId: getAttachmentMeta
      tags: [Attachments]
      responses:
        "200":
          description: Upload configuration (max file size, allowed types)

  # ── Issue Links ──────────────────────────────────────────────────
  /issueLink:
    post:
      summary: Create a link between two issues
      operationId: createIssueLink
      tags: [Issue Links]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_id, target_id, link_type]
              properties:
                source_id:
                  type: string
                target_id:
                  type: string
                link_type:
                  type: string
                  enum: [blocks, is_blocked, duplicates, relates]
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueLink"

  /issueLink/{linkId}:
    get:
      summary: Get an issue link
      operationId: getIssueLink
      tags: [Issue Links]
      parameters:
        - name: linkId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Issue link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueLink"
        "404":
          description: Link not found
    delete:
      summary: Delete an issue link
      operationId: deleteIssueLink
      tags: [Issue Links]
      parameters:
        - name: linkId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Link deleted

  # ── Watchers ─────────────────────────────────────────────────────
  /issue/{issueIdOrKey}/watchers:
    get:
      summary: List watchers for an issue
      operationId: getWatchers
      tags: [Watchers]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Watcher list
          content:
            application/json:
              schema:
                type: object
                properties:
                  watchers:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
    post:
      summary: Add a watcher to an issue
      operationId: addWatcher
      tags: [Watchers]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: Username of the watcher to add
      responses:
        "204":
          description: Watcher added
    delete:
      summary: Remove a watcher from an issue
      operationId: removeWatcher
