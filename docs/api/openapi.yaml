      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Webhook secret token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Provider-specific webhook payload
      responses:
        "200":
          description: Webhook processed

  # ── Export ───────────────────────────────────────────────────────
  /project/{projectIdOrKey}/issues/export:
    get:
      summary: Export project issues as CSV
      operationId: exportIssuesCSV
      tags: [Export]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  # ── Custom Fields ────────────────────────────────────────────────
  /project/{projectIdOrKey}/custom-fields:
    get:
      summary: List custom fields for a project
      operationId: listCustomFields
      tags: [CustomFields]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Custom field list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomField"
    post:
      summary: Create a custom field
      operationId: createCustomField
      tags: [CustomFields]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, field_type]
              properties:
                name:
                  type: string
                field_type:
                  type: string
                  enum: [text, number, date, select, multiselect, user]
      responses:
        "201":
          description: Custom field created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomField"

  /custom-fields/{fieldID}:
    delete:
      summary: Delete a custom field
      operationId: deleteCustomField
      tags: [CustomFields]
      parameters:
        - name: fieldID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Field deleted

  /custom-fields/{fieldID}/options:
    get:
      summary: List options for a custom field
      operationId: listFieldOptions
      tags: [CustomFields]
      parameters:
        - name: fieldID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Option list
    post:
      summary: Add an option to a custom field
      operationId: addFieldOption
      tags: [CustomFields]
      parameters:
        - name: fieldID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
      responses:
        "201":
          description: Option created

  /custom-fields/options/{optionID}:
    delete:
      summary: Remove a custom field option
      operationId: removeFieldOption
      tags: [CustomFields]
      parameters:
        - name: optionID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Option removed

  /issue/{issueIdOrKey}/custom-values:
    get:
      summary: Get custom field values for an issue
      operationId: getCustomValues
      tags: [CustomFields]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Custom values for the issue

  /issue/{issueIdOrKey}/custom-values/{fieldID}:
    put:
      summary: Set a custom field value on an issue
      operationId: setCustomValue
      tags: [CustomFields]
      parameters:
        - name: issueIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: fieldID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value: {}
                option_id:
                  type: string
      responses:
        "200":
          description: Value set

  # ── Automation ───────────────────────────────────────────────────
  /project/{projectIdOrKey}/automation:
    get:
      summary: List automation rules
      operationId: listAutomationRules
      tags: [Automation]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Automation rule list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationRule"
    post:
      summary: Create an automation rule
      operationId: createAutomationRule
      tags: [Automation]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, trigger_type, conditions_json, actions_json]
              properties:
                name:
                  type: string
                trigger_type:
                  type: string
                conditions_json:
                  type: string
                actions_json:
                  type: string
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"

  /automation/{ruleID}:
    get:
      summary: Get an automation rule
      operationId: getAutomationRule
      tags: [Automation]
      parameters:
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rule details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRule"
    patch:
      summary: Update an automation rule
      operationId: updateAutomationRule
      tags: [Automation]
      parameters:
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                is_active:
                  type: boolean
                trigger_type:
                  type: string
                conditions_json:
                  type: string
                actions_json:
                  type: string
      responses:
        "200":
          description: Rule updated
    delete:
      summary: Delete an automation rule
      operationId: deleteAutomationRule
      tags: [Automation]
      parameters:
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Rule deleted

  /automation/{ruleID}/execute:
    post:
      summary: Test-execute an automation rule
      operationId: executeAutomationRule
      tags: [Automation]
      parameters:
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [issue_id]
              properties:
                issue_id:
                  type: string
      responses:
        "200":
          description: Execution result

  /automation/{ruleID}/runs:
    get:
      summary: List execution runs for an automation rule
      operationId: listAutomationRuns
      tags: [Automation]
      parameters:
        - name: ruleID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Run history

  # ── Timeline ─────────────────────────────────────────────────────
  /project/{projectIdOrKey}/timeline:
    get:
      summary: Get timeline (Gantt) data
      operationId: getTimeline
      tags: [Timeline]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: zoom
          in: query
          schema:
            type: string
            enum: [weeks, months, quarters]
            default: months
      responses:
        "200":
          description: Timeline data

  # ── Calendar ─────────────────────────────────────────────────────
  /project/{projectIdOrKey}/calendar:
    get:
      summary: Get calendar data
      operationId: getCalendar
      tags: [Calendar]
      parameters:
        - name: projectIdOrKey
          in: path
          required: true
          schema:
            type: string
        - name: year
          in: query
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Calendar data

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Pagination ──────────────────────────────────────────────────
    PageResponse:
      type: object
      properties:
        startAt:
          type: integer
        maxResults:
          type: integer
        total:
          type: integer
        isLast:
          type: boolean
        values:
          type: array
          items: {}

    PageResponseUser:
      allOf:
        - $ref: "#/components/schemas/PageResponse"
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: "#/components/schemas/User"

    PageResponseProject:
      allOf:
        - $ref: "#/components/schemas/PageResponse"
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: "#/components/schemas/Project"

    PageResponseIssue:
      allOf:
        - $ref: "#/components/schemas/PageResponse"
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: "#/components/schemas/Issue"

    PageResponseComment:
      allOf:
        - $ref: "#/components/schemas/PageResponse"
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: "#/components/schemas/Comment"

    PageResponseDashboard:
      allOf:
        - $ref: "#/components/schemas/PageResponse"
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: "#/components/schemas/Dashboard"

    PageResponseFilter:
      allOf:
        - $ref: "#/components/schemas/PageResponse"
        - type: object
          properties:
            values:
              type: array
              items:
                $ref: "#/components/schemas/SavedFilter"

    # ── Error ──────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        errorMessages:
          type: array
          items:
            type: string
        errors:
          type: object
          additionalProperties:
            type: string
        status:
          type: integer

    # ── User ───────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        username:
          type: string
        display_name:
          type: string
        avatar_url:
          type: string
        is_admin:
          type: boolean
        is_active:
          type: boolean

    # ── Project ────────────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [scrum, kanban, business]
        lead_user_id:
          type: string
        default_assignee:
          type: string
        icon_url:
          type: string
        is_archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        project_id:
          type: string
        user_id:
          type: string

    # ── Issue ──────────────────────────────────────────────────────
    Issue:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        key:
          type: string
        title:
          type: string
        description_json:
          type: string
        type_id:
          type: string
        status_id:
          type: string
        priority:
          type: string
          enum: [highest, high, medium, low, lowest]
        assignee_id:
          type: string
        reporter_id:
          type: string
        resolution_id:
          type: string
        parent_id:
          type: string
        sprint_id:
          type: string
        version_id:
          type: string
        story_points:
          type: integer
        original_estimate:
          type: integer
        time_spent:
          type: integer
        start_date:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        environment:
          type: string
        is_archived:
          type: boolean
        position:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Comment ────────────────────────────────────────────────────
    Comment:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        author_id:
          type: string
        body_json:
          type: string
        is_deleted:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Issue Attachment ───────────────────────────────────────────
    IssueAttachment:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        filename:
          type: string
        file_path:
          type: string
        file_size:
          type: integer
        uploader_id:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Label ──────────────────────────────────────────────────────
    Label:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        color:
          type: string

    # ── Issue History ──────────────────────────────────────────────
    IssueHistory:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        actor_id:
          type: string
        field_name:
          type: string
        old_value:
          type: string
        new_value:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Issue Link ─────────────────────────────────────────────────
    IssueLink:
      type: object
      properties:
        id:
          type: string
        source_id:
          type: string
        target_id:
          type: string
        link_type:
          type: string
          enum: [blocks, is_blocked, duplicates, relates]

    # ── Workflow ───────────────────────────────────────────────────
    Workflow:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStatus"
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowTransition"
        created_at:
          type: string
          format: date-time

    WorkflowStatus:
      type: object
      properties:
        id:
          type: string
        workflow_id:
          type: string
        name:
          type: string
        category:
          type: string
          enum: [todo, inprogress, done]
        color:
          type: string
        position:
          type: integer

    WorkflowTransition:
      type: object
      properties:
        id:
          type: string
        workflow_id:
          type: string
        from_status_id:
          type: string
        to_status_id:
          type: string

    # ── Sprint ─────────────────────────────────────────────────────
    Sprint:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        goal:
          type: string
        state:
          type: string
          enum: [future, active, closed]
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ── Dashboard ──────────────────────────────────────────────────
    Dashboard:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        owner_id:
          type: string
        is_public:
          type: boolean
        layout_json:
          type: string
        created_at:
          type: string
          format: date-time

    DashboardWidget:
      type: object
      properties:
        id:
          type: string
        dashboard_id:
          type: string
        widget_type:
          type: string
        config_json:
          type: string
        position_json:
          type: string

    # ── Saved Filter ───────────────────────────────────────────────
    SavedFilter:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        owner_id:
          type: string
        name:
          type: string
        jql:
          type: string
        is_shared:
          type: boolean
        is_favourite:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Notification ───────────────────────────────────────────────
    NotificationSetting:
      type: object
      properties:
        user_id:
          type: string
        project_id:
          type: string
        event_type:
          type: string
        via_email:
          type: boolean
        via_app:
          type: boolean

    # ── Git ────────────────────────────────────────────────────────
    GitProviderConfig:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        provider_type:
          type: string
          enum: [github, gitlab, gitea, forgejo]
        base_url:
          type: string
        created_at:
          type: string
          format: date-time

    IssueCommit:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        provider_id:
          type: string
        commit_sha:
          type: string
        message:
          type: string
        author:
          type: string
        committed_at:
          type: string
          format: date-time

    IssueBranch:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        provider_id:
          type: string
        branch_name:
          type: string
        repo_url:
          type: string

    IssuePullRequest:
      type: object
      properties:
        id:
          type: string
        issue_id:
          type: string
        provider_id:
          type: string
        pr_number:
          type: integer
        title:
          type: string
        url:
          type: string
        state:
          type: string
        created_at:
          type: string
          format: date-time
        merged_at:
          type: string
          format: date-time

    # ── Custom Field ───────────────────────────────────────────────
    CustomField:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        field_type:
          type: string
          enum: [text, number, date, select, multiselect, user]

    # ── Automation ─────────────────────────────────────────────────
    AutomationRule:
      type: object
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        is_active:
          type: boolean
        trigger_type:
          type: string
        conditions_json:
          type: string
        actions_json:
          type: string
